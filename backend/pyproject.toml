[project]
name = "syllabusslayer-backend"
version = "0.1.0"
description = "SyllabusSlayer API — FastAPI backend that turns teacher resources into a roguelike quiz-RPG"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlmodel>=0.0.22",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "pyjwt[crypto]>=2.9",
    "python-multipart>=0.0.12",
    "httpx>=0.27",
    "openai>=1.50",
    "tiktoken>=0.8",
    "alembic>=1.13",
    # Postgres / pgvector (used in prod against Supabase; harmless locally)
    "psycopg[binary]>=3.2",
    "pgvector>=0.3",
    # Default document parser (light, pure-Python) — kept in base so prod can parse uploads.
    "markitdown[pdf,docx,pptx]>=0.0.1",
]

[project.optional-dependencies]
# Docling gives richer structure but pulls CPU torch (~heavy) and OOMs on large PDFs on
# small machines; MarkItDown (base dep) is the default parser. Optional:  uv sync --extra docling
docling = [
    "docling>=2.0",
]
dev = [
    "ruff>=0.6",
    "pytest>=8.3",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic scaffold + autogenerated migrations are tooling-managed, not hand-styled.
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# UP042: `(str, Enum)` is intentional — it serializes cleanly with Pydantic + OpenAI
# Structured Outputs; we don't want StrEnum's behavioural differences.
ignore = ["UP042"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom puts Depends()/File()/etc. in argument defaults.
extend-immutable-calls = ["fastapi.Depends", "fastapi.File", "fastapi.Query", "fastapi.Body", "fastapi.Form"]

[tool.ruff.lint.per-file-ignores]
# Long prompt/instruction string literals are clearer unwrapped.
"app/services/generation.py" = ["E501"]
# Tests favour readability over line length.
"tests/*" = ["E501"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
